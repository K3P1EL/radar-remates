name: Radar Remates

on:
  schedule:
    - cron: '0 12,15,18,21,0,3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py
      
      - name: Commit updated data
        run: |
          git config --local user.email "radar-remates@bot"
          git config --local user.name "Radar Remates Bot"
          git add data/seen.json data/remates.json
          git diff --staged --quiet || git commit -m "🔄 Actualizar remates $(date +'%Y-%m-%d %H:%M')"
          git push
